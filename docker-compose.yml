services:
  web:
    build: .
    container_name: tooktak
    ports:
      - "3000:3000"
    environment:
      - RAILS_ENV=production
      - RAILS_MASTER_KEY=${RAILS_MASTER_KEY}
      - RAILS_LOG_TO_STDOUT=1
      - RAILS_SERVE_STATIC_FILES=1
      - SOLID_QUEUE_IN_PUMA=1
      - WEB_CONCURRENCY=1
    volumes:
      - tooktak_storage:/rails/storage
      - tooktak_db:/rails/db
    restart: unless-stopped

volumes:
  tooktak_storage:
  tooktak_db:
